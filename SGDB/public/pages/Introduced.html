<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookConnect</title>
    <link rel="stylesheet" href="/css/style1.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>

<body>
    <div class="background-container">
        <header class="cabeçalho">
            <div class="logotipo">
                <img src="/assets/logotipo.png" alt="BCLogo">
            </div>
            <div class="link-headers">
                <div class="header1" id="btnOpenSuporteHeader">Sobre nós</div>
                <div class="header2" id="btnOpenSuporteHeader">Suporte</div>
            </div>
        </header>

        <main class="main-content">
            <div class="left">
                <div class="containerLeft">
                    <section class="sobre-left">
                        <h1 class="destacarGradient">Book Connect</h1>
                        <h2>Explore seus gêneros literários favoritos de forma compartilhada.</h2>
                        <p>PLACEHOLDER</p>
                    </section>
                    <button class="ButtonStyle" id="#">LOGAR</button>
                </div>
            </div>
            <div class="right">
                <aside class="carrousel-sample">
                    <!-- Carrousel que gira automáticamente onde mostra livros baseado em gênero -->
                </aside>
                <aside class="filter-sample-button">
                    <!-- Três botões que filtram gêneros para mudar o carrousel -->
                </aside>
            </div>
        </main>

        <footer class="rodapé">
            <div class="footer-content">
                <div class="footer-section">
                    <p>Book Connect © 2026 - Todos os direitos reservados <span class="separator-footer">|</span><p>Siga-nos: </p><i class="bi bi-instagram"></i><i class="bi bi-twitter-x"></i><i class="bi bi-tiktok"></i>
                </div>
            </div>
        </footer>
    </div>

</body>

</html>
