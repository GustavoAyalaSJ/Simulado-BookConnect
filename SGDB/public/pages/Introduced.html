<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="background-container">
        <header class="cabeçalho">
            <div class="logotipo">
                <img src="assets/logotipo.png" alt="BookConnect">
            </div>

            <nav class="nav">
                <button id="btnOpenSobreHeader" class="nav-link" type="button">Sobre nós</button>
                <button id="btnOpenSuporteHeader" class="nav-link" type="button">Suporte</button>
            </nav>

        </header>

        <main class="hero">
            <section class="hero-content">
                <span class="hero-badge">Comunidade Literária</span>
                <h1 id="bc-titulo">Book Connect</h1>
                <h2>Explore seus gostos literários através da forma compartilhada.</h2>
                <p>Poste, comente, discuta outros usuários em um espaço simples e digital.</p>

                <button id="open-login-modal" class="btn-primary" type="button">Entrar</button>
            </section>

            <section class="hero-showcase">
                <h3 class="carousel-title">Descubra gêneros literários</h3>
                <div class="carousel-card">
                    <div class="carousel-viewport" aria-live="polite">
                        <div class="carousel-column" id="genre-carousel-column">
                        </div>
                    </div>
                </div>

                <div class="genre-filters" role="tablist">
                    <button type="button" class="genre-filter-btn" data-genre="romance" aria-pressed="true">Romance</button>
                    <button type="button" class="genre-filter-btn" data-genre="fantasy" aria-pressed="false">Fantasia</button>
                    <button type="button" class="genre-filter-btn" data-genre="ficcaocientifica" aria-pressed="false">Ficção Científica</button>
                </div>
            </section>

        </main>

        <div class="modal-backdrop" id="modal-backdrop" hidden aria-hidden="true">
        </div>

        <footer class="footer">
            <div class="footer-left">
                <p>Book Connect © 2026</p><span class="separator-footer">|</span><span>Todos os direitos reservados</span>
            </div>

            <div class="social-links">
                <i class="bi bi-instagram"></i>
                <i class="bi bi-twitter-x"></i>
                <i class="bi bi-tiktok"></i>
            </div>
        </footer>

    </div>
    <script src="src/script1.js"></script>
</body>

</html>
