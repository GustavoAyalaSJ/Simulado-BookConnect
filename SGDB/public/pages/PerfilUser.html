<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book Connect - Perfil do usuário." />
    <title>BookConnect - Perfil</title>
    <link rel="stylesheet" href="css/style3.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>

<body>
    <div class="background-container">
        <header class="cabeçalho">
            <div class="logotipo">
                <img src="assets/logotipo.png" alt="BookConnect">
            </div>

            <div class="settings-container" aria-label="Configurações">
                <i class="bi bi-gear-fill" aria-hidden="true"></i>
            </div>

            <div class="notification-container">
                <button id="notification-button" class="icon-button" type="button" aria-haspopup="true"
                    aria-expanded="false">
                    <i class="bi bi-bell" aria-hidden="true"></i>
                </button>

                <div id="notification-dropdown" class="dropdown-content" aria-label="Notificações">
                    <label class="notificationLabel">Notificações</label>

                    <section class="notificationWarning">
                        Você não possui nenhuma notificação no momento.
                    </section>

                    <div class="notificationFooter">
                        <p>Aviso: As notificações apagarão sozinhas no prazo de 30 dias.</p>
                    </div>
                </div>
            </div>

            <a class="icon-button exit-link" href="#" aria-label="Sair">
                <i class="bi bi-box-arrow-left" aria-hidden="true"></i>
            </a>
        </header>

        <main>
            <div class="meta-info">
                <h6 class="register-id">Cod_ID: <span id="codUnique-user">PLACEHOLDER</span></h6>
            </div>
        </main>

        <footer class="rodapé">
            <div class="footer-content">
                <div class="footer-section">
                    <p>
                        Book Connect © 2026 - Todos os direitos reservados <span class="separator-footer">|</span>
                    </p>
                    <p>Siga-nos:</p>
                </div>
            </div>
        </footer>
    </div>
    <script src="src/script3.js"></script>
    <script src="src/profile.js"></script>
</body>

</html>
