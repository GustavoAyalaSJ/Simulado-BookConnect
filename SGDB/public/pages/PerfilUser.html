<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookConnect - Profile</title>
    <link rel="stylesheet" href="/css/style3.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>

<body>
    <header class="cabeçalho">
        <div class="logotipo">
            <img src="/assets/logotipo.png" alt="BCLogo">
        </div>

        <div class="settings-container">
            <i class="bi bi-gear-fill"></i>
        </div>

        <div class="notification-container">
            <button id="notification-button" class="icon-button">
                <i class="bi bi-bell"></i>
            </button>

            <div id="notification-dropdown" class="dropdown-content">
                <label class="notificationLabel">Notificações</label>

                <section class="notificationWarning">
                    Você não possui nenhuma notificação no momento.
                </section>

                <div class="notificationFooter">
                    <p>Aviso: As notificações apagarão sozinhas no prazo de 30 dias.</p>
                </div>
            </div>
        </div>

        <a class="icon-button exit-link">
            <i class="bi bi-box-arrow-left"></i>
        </a>
    </header>
    
    <div class="meta-info">
        <h6 class="register-id">Cod_ID: <span id="codUnique-user">PLACEHOLDER</span></h6>
    </div>

    <footer class="rodapé">
        <div class="footer-content">
            <div class="footer-section">
                <p>Book Connect © 2026 - Todos os direitos reservados <span class="separator-footer">|</span>
                <p>Siga-nos: </p>
            </div>
        </div>
    </footer>
</body>

</html>
